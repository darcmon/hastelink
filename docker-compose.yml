version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: hastelink
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: haste_link
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
